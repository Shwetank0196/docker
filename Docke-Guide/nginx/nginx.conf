# Define upstream servers (backend services)
# "backend" refers to the service name in docker-compose.yml
# Docker's internal DNS resolves service names to container IPs
upstream backend {
    server backend:3000;
}

upstream frontend {
    server frontend:80;
}

# Main server configuration
server {
    # Listen on port 80 (HTTP)
    listen 80;
    server_name localhost;

    # Route API requests to backend service
    # Any request starting with /api/ goes to the Node.js backend
    location /api/ {
        # Forward request to backend upstream
        proxy_pass http://backend/;

        # Preserve original request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for real-time APIs
        proxy_buffering off;
    }

    # Route all other requests to frontend service
    # This serves the HTML/CSS/JS files
    location / {
        # Forward request to frontend upstream
        proxy_pass http://frontend/;

        # Preserve original request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint for Nginx itself
    location /nginx-health {
        access_log off;
        return 200 "Nginx is healthy\n";
        add_header Content-Type text/plain;
    }
}
